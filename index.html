<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodcastApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <a class="logo" href="#" aria-label="PodcastApp home">
        <svg class="logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="13" fill="#111118"/>
          <rect x="10.5" y="5.5" width="7" height="11" rx="3.5" fill="white"/>
          <path d="M7.5 15.5c0 3.59 2.91 6.5 6.5 6.5s6.5-2.91 6.5-6.5" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <line x1="14" y1="22" x2="14" y2="25" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="11.5" y1="25" x2="16.5" y2="25" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span class="logo-name">PodcastApp</span>
      </a>

      <div class="header-actions">
        <button class="icon-btn" id="search-toggle-btn" aria-label="Search">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <div class="avatar" role="img" aria-label="User profile">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="4" fill="#888"/>
            <ellipse cx="12" cy="19" rx="7" ry="4" fill="#888"/>
          </svg>
        </div>
      </div>
    </div>
  </header>

  <div class="search-overlay" id="search-overlay" role="search">
    <div class="search-box">
      <input id="search-input" type="search" placeholder="Search shows…" autocomplete="off" />
      <button class="search-close" id="search-close-btn">✕</button>
    </div>
  </div>

  <nav class="filter-bar">
    <div class="filter-inner">
      <span class="filter-label" id="filter-label">Filter by:</span>
      <select id="genre-select" class="filter-select"></select>
      <select id="sort-select" class="filter-select">
        <option value="newest">Recently Updated</option>
        <option value="az">Title A → Z</option>
        <option value="za">Title Z → A</option>
        <option value="oldest">Oldest First</option>
      </select>
    </div>
  </nav>

  <main class="page-content">
    <div class="shows-grid" id="shows-grid" role="list"></div>
  </main>

  <div id="modal-backdrop" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal-panel" id="modal-panel" tabindex="-1">
      <div id="modal-inner"></div>
    </div>
  </div>

  <!-- Entry Point Script -->
  <script type="module" src="app.js"></script>
</body>
</html>
